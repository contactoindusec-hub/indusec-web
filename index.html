		<style>
			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: radial-gradient(circle at top, #1f3250 0%, #0b111b 55%, #05070b 100%);
				font-family: "Raleway", Helvetica, sans-serif;
			}

			.construction-wrap {
				text-align: center;
				padding: 3rem 2rem;
				max-width: 780px;
				width: calc(100% - 2.5rem);
				border: 1px solid rgba(255, 255, 255, 0.14);
				border-radius: 1rem;
				background: rgba(16, 24, 38, 0.78);
				box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.35);
				backdrop-filter: blur(8px);
			}

			.pulse {
				width: 92px;
				height: 92px;
				margin: 0 auto 1.5rem;
				border-radius: 50%;
				position: relative;
				background: rgba(255, 255, 255, 0.06);
				border: 2px solid rgba(104, 170, 255, 0.85);
			}

			.pulse::before,
			.pulse::after {
				content: "";
				position: absolute;
				inset: -2px;
				border-radius: 50%;
				border: 2px solid rgba(104, 170, 255, 0.45);
				animation: ring 2.2s ease-out infinite;
			}

			.pulse::after {
				animation-delay: 1.1s;
			}

			.construction-wrap h1 {
				margin: 0.3rem 0 0.8rem;
				font-size: clamp(1.75rem, 4vw, 2.8rem);
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}

			.construction-wrap p {
				margin: 0 auto;
				font-size: 1.05rem;
				line-height: 1.8;
				max-width: 620px;
				color: rgba(255, 255, 255, 0.86);
			}

			.loading {
				margin-top: 1.4rem;
				font-weight: 600;
				letter-spacing: 0.09em;
				text-transform: uppercase;
				color: #84b9ff;
			}

			.dots span {
				display: inline-block;
				animation: blink 1.35s infinite;
			}

			.dots span:nth-child(2) { animation-delay: 0.2s; }
			.dots span:nth-child(3) { animation-delay: 0.4s; }

			@keyframes ring {
				0% { transform: scale(1); opacity: 0.8; }
				100% { transform: scale(1.75); opacity: 0; }
			}

			@keyframes blink {
				0%, 80%, 100% { opacity: 0.2; }
				40% { opacity: 1; }
			}
		</style>
	</head>
